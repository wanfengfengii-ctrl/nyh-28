{% extends 'base.html' %}

{% block title %}取消删除申请{% endblock %}

{% block content %}
    <div style="margin-bottom: 1rem;">
        <a href="{% url 'places:deletion_request_detail' deletion_request.pk %}" style="color: #3498db; text-decoration: none;">← 返回详情</a>
    </div>

    <div class="card">
        <h2 style="margin-bottom: 1rem;">取消删除申请</h2>

        <div style="padding: 1rem; background: #f8f9fa; border-radius: 6px; margin-bottom: 1.5rem;">
            <h4 style="margin-top: 0;">{{ deletion_request.place_name.name }}</h4>
            <p style="margin-bottom: 0.5rem;"><strong>申请人：</strong>{{ deletion_request.applicant|default:'-' }}</p>
            <p style="margin-bottom: 0.5rem;"><strong>删除理由：</strong></p>
            <p style="background: white; padding: 0.75rem; border-radius: 4px; margin: 0;">{{ deletion_request.reason }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>取消原因</label>
                <textarea name="comment" class="form-textarea" rows="3" placeholder="请填写取消原因（可选）..."></textarea>
            </div>
            <div class="action-bar">
                <a href="{% url 'places:deletion_request_detail' deletion_request.pk %}" class="btn btn-secondary">返回</a>
                <button type="submit" class="btn btn-warning">确认取消</button>
            </div>
        </form>
    </div>
{% endblock %}
