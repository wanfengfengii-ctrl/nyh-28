{% extends 'base.html' %}

{% block title %}解决争议{% endblock %}

{% block content %}
    <div style="margin-bottom: 1rem;">
        <a href="{% url 'places:dispute_detail' dispute.pk %}" style="color: #3498db; text-decoration: none;">← 返回争议详情</a>
    </div>

    <div class="card">
        <h2 style="margin-bottom: 1rem;">解决争议</h2>

        <div style="padding: 1rem; background: #f8f9fa; border-radius: 6px; margin-bottom: 1.5rem;">
            <h4 style="margin-top: 0;">{{ dispute.title }}</h4>
            <p style="color: #7f8c8d; margin-bottom: 0.5rem;">关联地名：
                <a href="{% url 'places:place_detail' dispute.place_name.pk %}" style="color: #2980b9;">{{ dispute.place_name.name }}</a>
            </p>
            <p style="margin-bottom: 0.5rem;"><strong>争议内容：</strong></p>
            <p style="background: white; padding: 0.75rem; border-radius: 4px; margin: 0;">{{ dispute.content }}</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>处理人</label>
                <input type="text" name="resolver" class="form-input" placeholder="请输入处理人姓名">
            </div>
            <div class="form-group">
                <label>解决方式</label>
                <select name="resolution_type" class="form-select">
                    <option value="evidence">证据裁定</option>
                    <option value="vote">投票表决</option>
                    <option value="expert">专家裁定</option>
                    <option value="merged">合并处理</option>
                    <option value="withdrawn">撤回申请</option>
                </select>
            </div>
            <div class="form-group">
                <label>解决方案 <span style="color: #e74c3c;">*</span></label>
                <textarea name="resolution" class="form-textarea" rows="6" placeholder="请详细说明解决方案..." required></textarea>
            </div>
            <div class="action-bar">
                <a href="{% url 'places:dispute_detail' dispute.pk %}" class="btn btn-secondary">取消</a>
                <button type="submit" class="btn btn-success">确认解决</button>
            </div>
        </form>
    </div>
{% endblock %}
